<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Echo-Type Mobile</title>

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

  <style>
    body {
      background: #111;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    #setup-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #pin-input {
      font-size: 40px;
      letter-spacing: 8px;
      width: 220px;
      text-align: center;
      background: #222;
      color: white;
      border: 2px solid #007bff;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 20px;
    }

    #connect-btn {
      background: #007bff;
      color: white;
      font-size: 18px;
      padding: 14px 40px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    #connect-btn:disabled {
      background: #555;
      cursor: not-allowed;
    }

    #mic-screen {
      display: none;
      flex-direction: column;
      align-items: center;
    }

    #mic-btn {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: #ff4757;
      border: none;
      font-size: 70px;
      box-shadow: 0 0 40px rgba(255, 71, 87, 0.6);
      cursor: pointer;
      transition: 0.2s;
    }

    #mic-btn.active {
      background: #2ed573;
      box-shadow: 0 0 60px rgba(46, 213, 115, 0.8);
      transform: scale(1.05);
    }

    #status {
      margin-bottom: 30px;
      font-size: 18px;
      font-weight: bold;
      color: #7bed9f;
    }

    #preview {
      margin-top: 30px;
      font-size: 16px;
      color: #aaa;
      min-height: 40px;
      padding: 0 20px;
    }
  </style>
</head>

<body>

  <!-- PIN SCREEN -->
  <div id="setup-screen">
    <h2>Enter 4‑Digit Code</h2>
    <input type="number" id="pin-input" maxlength="4" placeholder="0000">
    <button id="connect-btn">Pair Device</button>
  </div>

  <!-- MIC SCREEN -->
  <div id="mic-screen">
    <div id="status">✅ Connected</div>
    <button id="mic-btn">🎙️</button>
    <div id="preview">Tap mic and speak</div>
  </div>

  <script>
    const setupScreen = document.getElementById('setup-screen');
    const micScreen = document.getElementById('mic-screen');
    const pinInput = document.getElementById('pin-input');
    const connectBtn = document.getElementById('connect-btn');
    const micBtn = document.getElementById('mic-btn');
    const previewEl = document.getElementById('preview');
    const statusEl = document.getElementById('status');

    // Strong STUN config
    const peer = new Peer({
      config: {
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          { urls: "stun:stun1.l.google.com:19302" },
          { urls: "stun:stun.services.mozilla.com" }
        ]
      }
    });

    let conn;
    let timeout;

    // Auto-fill PIN if opened via QR
    const urlParams = new URLSearchParams(window.location.search);
    const qrPin = urlParams.get('pin');
    if (qrPin) pinInput.value = qrPin;

    connectBtn.addEventListener('click', () => {
      const pin = pinInput.value;

      if (pin.length !== 4) {
        alert("Enter 4-digit code");
        return;
      }

      connectBtn.disabled = true;
      connectBtn.innerText = "Connecting...";

      const pcId = "echotype-pc-" + pin;
      conn = peer.connect(pcId, { reliable: true });

      conn.on('open', () => {
        conn.send("PING"); // Step 1: Phone ready
      });

      conn.on('data', (data) => {
        if (data === "PONG") {
          clearTimeout(timeout);
          setupScreen.style.display = "none";
          micScreen.style.display = "flex";
        }
      });

      timeout = setTimeout(() => {
        alert("Connection failed. Make sure PC extension is open.");
        connectBtn.disabled = false;
        connectBtn.innerText = "Pair Device";
      }, 10000);
    });

    // Voice Recognition
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.continuous = false;

    let recording = false;

    micBtn.addEventListener('click', () => {
      if (!recording) {
        recognition.start();
        micBtn.classList.add('active');
        statusEl.innerText = "Listening...";
        recording = true;
      } else {
        recognition.stop();
        micBtn.classList.remove('active');
        statusEl.innerText = "✅ Connected";
        recording = false;
      }
    });

    recognition.onresult = (event) => {
      const text = event.results[0][0].transcript;
      previewEl.innerText = text;

      if (conn && conn.open) {
        conn.send(text);
      }

      micBtn.classList.remove('active');
      statusEl.innerText = "✅ Sent";
      recording = false;
    };

    recognition.onerror = () => {
      micBtn.classList.remove('active');
      recording = false;
    };
  </script>

</body>
</html>
